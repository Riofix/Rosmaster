# ============================================================
# 视觉处理管线参数配置 (robot_vision)
# 所有参数从此文件读取，修改后重启节点即可生效
# 旧的 JSON 配置文件保留作为参考，不再被代码读取
# ============================================================

# ==================== 透视变换目标尺寸 ====================
# 每个 ROI 区域经过透视变换后校正成的目标矩形尺寸
warp_target:
  width: 300          # 目标宽度 (原 TW)
  height: 120         # 目标高度 (原 TH)

# ==================== 模板匹配尺寸 ====================
# 模板图片和待识别数字切片都会缩放到此尺寸进行 TM_CCOEFF_NORMED 匹配
match_size:
  width: 64           # 匹配宽度
  height: 64          # 匹配高度

# ==================== 帧堆叠去噪 ====================
# 连续采集 frame_stack_size 帧后取平均，消除随机噪声
# 值越大去噪越强，但响应越慢；建议 5~15
frame_stack_size: 10

# ==================== 历史投票队列长度 ====================
# 存储最近 N 个合法的全排列序列 (1-5不重复)
# 最终结果从历史队列中取出现次数最多的序列
# 值越大结果越稳定，但切换响应越慢；建议 5~20
history_vote_size: 10

# ==================== 调试模式 ====================
# true:  每帧识别结果只打印日志到控制台，不发布到话题
#        只有超时（timeout_limit 秒后）才发布最终结果到话题
# false: 一旦识别出稳定序列立即发布到话题（正常模式）
debug_mode: true

# ==================== 超时强制输出 ====================
# 启动后超过此时间(秒)仍未输出结果时，强制发布当前最佳结果
timeout_limit: 5.0

# ==================== 左相机配置 ====================
left_camera:
  device_id: 2                      # 设备索引
  resolution: [1280, 720]           # 分辨率 [宽, 高]
  fourcc: "MJPG"                    # 编码格式
  # 4 个 ROI 区域顶点坐标 (每个ROI 4个点, 每个点 [x, y])
  rois:
    - [[2, 303], [0, 382], [188, 378], [191, 304]]
    - [[339, 307], [337, 362], [499, 358], [498, 308]]
    - [[580, 313], [580, 358], [683, 360], [686, 313]]
    - [[802, 316], [807, 369], [897, 373], [904, 314]]
  # 图像预处理参数
  preprocessing:
    CLAHE: 1           # CLAHE 裁剪限制 (0=关闭, >0 开启)
    Median: 1           # 中值滤波核大小因子 (实际核 = Median*2+1)
    Threshold: 127      # 二值化阈值
    Morph_Size: 2       # 形态学开运算核大小 (0=关闭)
    Center_Dist: 80     # 轮廓中心距离阈值 (像素)

# ==================== 右相机配置 ====================
right_camera:
  device_id: 0                      # 设备索引
  resolution: [1280, 720]           # 分辨率 [宽, 高]
  fourcc: "MJPG"                    # 编码格式
  # 4 个 ROI 区域顶点坐标 (每个ROI 4个点, 每个点 [x, y])
  rois:
    - [[379, 321], [379, 372], [468, 369], [467, 324]]
    - [[573, 318], [574, 364], [680, 358], [677, 315]]
    - [[781, 307], [786, 358], [944, 355], [943, 299]]
    - [[1063, 296], [1061, 362], [1270, 366], [1275, 290]]
  # 图像预处理参数
  preprocessing:
    CLAHE: 2           # CLAHE 裁剪限制 (0=关闭, >0 开启)
    Median: 1           # 中值滤波核大小因子 (实际核 = Median*2+1)
    Threshold: 127      # 二值化阈值
    Morph_Size: 2       # 形态学开运算核大小 (0=关闭)
    Center_Dist: 80     # 轮廓中心距离阈值 (像素)

# ============================================================
#  位置参数 — 由 brain_node 在启动时加载
#  单位:
#    rail / grab  = 步进电机脉冲数 (pulses)
#    chassis      = 编码器计数值 (encoder counts)
# ============================================================

# --- 环形轨道位置 (handle stepper_x, 脉冲数) ---
rail:
  ring_max: 178000       # 环形轨道一圈脉冲数
  pos_1: 0
  pos_2: 150
  pos_3: 300
  pos_4: 450
  pos_5: 600
  pos_6: 750
  pos_7: 900

# --- 底盘目标位置 (chassis, 编码器计数, 1cm=243脉冲) ---
chassis:
  start_zone: 0           # 起始区 0mm
  obstacle_b: 27945       # 避障点B 1150mm (放置区方向)
  drop_zone: 30375        # 放置区 1250mm (W方向)
  obstacle_a: -40095      # 避障点A 1650mm (S方向, 编码器减小)
  grab_zone: -47628       # 抓取区 1960mm (S方向, 编码器减小)
  end_zone: 0             # 结束区 0mm

# --- 抓取动作 (handle stepper_x / stepper_z, 相对脉冲数) ---
grab:
  z_down_first: 500       # 步骤1: Z轴首次相对下降量
  x_cw_delta: 800         # 步骤3: X轴顺时针相对位移
  x_ccw_delta: 300        # 步骤5: X轴逆时针相对位移
  z_delta: 50             # 步骤4/6: Z轴每次相对下降量
  z_up_total: 200         # 步骤10: Z轴相对上升量（回到安全高度）

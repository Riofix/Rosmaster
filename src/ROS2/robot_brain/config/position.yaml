# ============================================================
#  位置参数 — 由 brain_node 在启动时加载
#  单位:
#    rail / grab  = 步进电机脉冲数 (pulses)
#    chassis      = 编码器计数值 (encoder counts)
# ============================================================

# --- 环形轨道位置 (handle stepper_x, 脉冲数, 1圈=393cm=141303脉冲) ---
# 顺时针: 1→7→2→3→4→8→6→5→(回1)
rail:
  ring_max: 141303
  pos_1: 0       #   0cm  放豆
  pos_7: 14022   #  31cm  中抓取
  pos_2: 14382   #  40cm  放豆
  pos_3: 28764   #  80cm  放豆
  pos_4: 46741   # 130cm  放豆
  pos_8: 70471   # 196cm  右抓取
  pos_6: 101393  # 282cm  左抓取
  pos_5: 123325  # 343cm  放豆

# --- 底盘目标位置 (chassis, 编码器计数, 1cm=243脉冲) ---
chassis:
  start_zone: 0           # 起始区 0mm
  obstacle_b: 27945       # 避障点B 1150mm (放置区方向)
  drop_zone: 30375        # 放置区 1250mm (W方向)
  obstacle_a: -40095      # 避障点A 1650mm (S方向, 编码器减小)
  grab_zone: -47628       # 抓取区 1960mm (S方向, 编码器减小)
  end_zone: 0             # 结束区 0mm

